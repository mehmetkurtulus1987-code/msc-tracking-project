<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSC Konteyner Takip</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #ffcc00; background: #000; padding: 10px; text-align: center; border-radius: 5px; }
        input { width: 70%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #000; color: #ffcc00; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #333; }
        #result { margin-top: 20px; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f8f8f8; width: 40%; }
        .error { color: red; margin-top: 10px; font-weight: bold; }
        .loading { font-style: italic; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2>MSC Takip Sistemi</h2>
    <div style="text-align: center;">
        <input type="text" id="kontNo" placeholder="Konteyner Numarası (Örn: TCKU4101670)">
        <button onclick="sorgula()">SORGULA</button>
    </div>
    
    <div id="status" class="loading"></div>

    <div id="result">
        <table>
            <tr><th>Konteyner Numarası</th><td id="res_no"></td></tr>
            <tr><th>Gemi Adı / Seferi</th><td id="res_gemi"></td></tr>
            <tr><th>Yükleme Tesisi</th><td id="res_tesis"></td></tr>
            <tr><th>Boşaltma Limanı</th><td id="res_liman"></td></tr>
            <tr><th>Konteyner Türü</th><td id="res_tur"></td></tr>
        </table>
    </div>
</div>

<script>
    async function sorgula() {
        const no = document.getElementById('kontNo').value.trim();
        const status = document.getElementById('status');
        const resultDiv = document.getElementById('result');
        
        if (!no) return alert("Lütfen bir numara girin.");

        status.innerText = "Sorgulanıyor...";
        status.className = "loading";
        resultDiv.style.display = "none";

        const url = `https://www.msc.com/api/feature/vessel-tracking/tracking-results?trackingNumber=${no}`;

        try {
            // Not: Tarayıcılar CORS politikası nedeniyle doğrudan başka sitenin API'sine istek atmayı engelleyebilir.
            // Bu durumda tarayıcına "CORS Unblock" eklentisi kurman gerekebilir.
            const response = await fetch(url, {
                headers: {
                    'Accept': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest'
                }
            });

            if (!response.ok) throw new Error("Veri çekilemedi. (CORS veya 403 Hatası)");

            const data = await response.json();
            const res = data.TrackingResults[0];

            if (res) {
                const events = res.Events || [];
                const lastEvent = events[events.length - 1] || {};
                const firstEvent = events[0] || {};

                document.getElementById('res_no').innerText = res.ContainerDetail.ContainerNumber || no;
                document.getElementById('res_gemi').innerText = `${lastEvent.VesselName || ''} ${lastEvent.VoyageNo || ''}`;
                document.getElementById('res_tesis').innerText = firstEvent.EquipmentHandling?.Name || "Bilgi Yok";
                document.getElementById('res_liman').innerText = res.GeneralTrackingInfo.PortOfDischarge || "Bilgi Yok";
                document.getElementById('res_tur').innerText = res.ContainerDetail.ContainerType || "Bilgi Yok";

                status.innerText = "";
                resultDiv.style.display = "block";
            } else {
                status.innerText = "Kayıt bulunamadı.";
                status.className = "error";
            }
        } catch (error) {
            console.error(error);
            status.innerText = "Hata: Tarayıcı güvenliği (CORS) isteği engelledi. Lütfen 'CORS Unblock' eklentisi kullanın.";
            status.className = "error";
        }
    }
</script>

</body>
</html>
